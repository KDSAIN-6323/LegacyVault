server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver — runtime resolution, not startup-time
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Variable forces nginx to use the resolver at request time
    set $upstream_api http://api:5000;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API — no path in proxy_pass so the full URI is forwarded unchanged
    # /api/auth/login  →  http://api:5000/api/auth/login
    location /api/ {
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy uploads — ^~ prevents the static-asset regex rule from matching /uploads/*.jpg etc.
    location ^~ /uploads/ {
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
