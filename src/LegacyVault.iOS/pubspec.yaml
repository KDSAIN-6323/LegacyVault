name: legacy_vault
description: LegacyVault — personal knowledge vault app for iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  sqflite: ^2.4.1
  path: ^1.9.0
  pointycastle: ^3.9.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  local_auth: ^2.3.0
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
